<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 인증 패널 (비로그인 상태에서 표시) -->
  <div id="auth-panel">

    <!-- 로그인 화면 -->
    <div id="view-signin" class="auth-card">
      <h1>Kanban Board</h1>
      <h2>로그인</h2>
      <form id="form-signin">
        <label for="signin-email">이메일</label>
        <input id="signin-email" type="email" required placeholder="you@example.com" />
        <label for="signin-password">비밀번호</label>
        <input id="signin-password" type="password" required placeholder="비밀번호" />
        <button type="submit">로그인</button>
        <p id="signin-error" class="auth-error" aria-live="polite"></p>
      </form>
      <div class="auth-divider"><span>또는</span></div>
      <button id="btn-github-signin" class="btn-github">GitHub로 로그인</button>
      <p class="auth-switch">계정이 없으신가요? <button id="btn-go-signup" class="link-btn">회원가입</button></p>
    </div>

    <!-- 회원가입 화면 -->
    <div id="view-signup" class="auth-card hidden">
      <h1>Kanban Board</h1>
      <h2>회원가입</h2>
      <form id="form-signup">
        <label for="signup-email">이메일</label>
        <input id="signup-email" type="email" required placeholder="you@example.com" />
        <label for="signup-password">비밀번호</label>
        <input id="signup-password" type="password" required placeholder="6자 이상" minlength="6" />
        <button type="submit">회원가입</button>
        <p id="signup-error" class="auth-error" aria-live="polite"></p>
      </form>
      <p class="auth-switch">이미 계정이 있으신가요? <button id="btn-go-signin" class="link-btn">로그인</button></p>
    </div>

    <!-- 이메일 인증 대기 화면 -->
    <div id="view-verify" class="auth-card hidden">
      <h1>Kanban Board</h1>
      <h2>이메일 인증 필요</h2>
      <p style="text-align:center; color: var(--color-text-secondary); font-size: var(--font-size-sm);">
        가입하신 이메일 주소로 인증 링크를 보냈습니다.<br />
        이메일을 확인하고 링크를 클릭해 주세요.
      </p>
      <p class="auth-hint">링크를 클릭하면 자동으로 로그인됩니다.</p>
      <p class="auth-switch"><button id="btn-back-signin" class="link-btn">로그인으로 돌아가기</button></p>
    </div>

  </div>

  <!-- 칸반 보드 (로그인 후 표시) -->
  <div id="board-wrapper" class="hidden">
    <header>
      <h1>Kanban Board</h1>
      <div class="header-right">
        <span id="user-email" class="user-email"></span>
        <button id="btn-signout">로그아웃</button>
      </div>
    </header>

    <main class="board">
      <section class="column" id="todo" data-column="todo">
        <div class="column-header">
          <h2>Todo</h2>
          <span class="card-count">0</span>
        </div>
        <div class="cards"></div>
        <form class="add-form">
          <input type="text" placeholder="새 카드 추가..." />
          <button type="submit">추가</button>
        </form>
      </section>

      <section class="column" id="in-progress" data-column="in-progress">
        <div class="column-header">
          <h2>In Progress</h2>
          <span class="card-count">0</span>
        </div>
        <div class="cards"></div>
        <form class="add-form">
          <input type="text" placeholder="새 카드 추가..." />
          <button type="submit">추가</button>
        </form>
      </section>

      <section class="column" id="done" data-column="done">
        <div class="column-header">
          <h2>Done</h2>
          <span class="card-count">0</span>
        </div>
        <div class="cards"></div>
        <form class="add-form">
          <input type="text" placeholder="새 카드 추가..." />
          <button type="submit">추가</button>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="auth.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
